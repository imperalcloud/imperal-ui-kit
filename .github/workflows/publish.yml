name: Publish @imperal/ui-kit to npm
# Publishes a public release when a version tag (v*) is pushed.
# Requires repo secret NPM_TOKEN (an npmjs.com automation token for the @imperal scope).
on:
  push:
    tags: ["v*"]
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm install --legacy-peer-deps
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
